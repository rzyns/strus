name: Commitlint

on:
  pull_request:
    branches: [main]

jobs:
  commitlint:
    name: Enforce Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install commitlint
        run: pnpm add -g @commitlint/cli @commitlint/config-conventional

      - name: Lint commits
        run: |
          npx commitlint \
            --from ${{ github.event.pull_request.base.sha }} \
            --to ${{ github.event.pull_request.head.sha }} \
            --verbose
