name: Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    name: Build & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write      # create GitHub releases
      packages: write      # push to ghcr.io
      id-token: write      # for OIDC / attestations

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for changelog generation

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # -----------------------------------------------------------------------
      # Sync package versions from git tag & publish to GitHub Packages
      # -----------------------------------------------------------------------
      - name: Set package versions from tag
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"   # strip 'v' prefix → "1.2.3"
          echo "Publishing version: $VERSION"
          find packages -name "package.json" -not -path "*/node_modules/*" \
            -exec sh -c '
              tmp=$(mktemp)
              jq --arg v "$1" ".version = \$v" "$2" > "$tmp" && mv "$tmp" "$2"
            ' _ "$VERSION" {} \;

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@rzyns'

      - name: Publish packages to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for pkg in config core morph db api cli; do
            echo "--- Publishing @rzyns/strus-$pkg ---"
            cd packages/$pkg
            npm publish
            cd ../..
          done

      # -----------------------------------------------------------------------
      # Generate changelog (commits since last tag)
      # -----------------------------------------------------------------------
      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG_RELEASE.md
          GITHUB_REPO: ${{ github.repository }}

      # -----------------------------------------------------------------------
      # Build web frontend
      # -----------------------------------------------------------------------
      - name: Build web
        run: bun run --filter @rzyns/strus-web build
        env:
          NODE_ENV: production

      # -----------------------------------------------------------------------
      # Build & push Docker image
      # -----------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -----------------------------------------------------------------------
      # Create GitHub release
      # -----------------------------------------------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG_RELEASE.md
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
