# Grafana Tempo v2.x — single-binary config for local dev
# Verified against v2.10.1

server:
  http_listen_port: 3200
  log_level: warn

# Single-node memberlist — tells Tempo it's not joining a cluster.
# Required in v2.7+ so the partition ring can elect itself and queries work.
memberlist:
  abort_if_cluster_join_fails: false
  join_members: []

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m
  lifecycler:
    ring:
      kvstore:
        store: memberlist
      replication_factor: 1

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks
