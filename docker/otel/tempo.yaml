# Grafana Tempo — single-binary config for local dev
# Pinned to 2.6.1: last version before partition rings (introduced in 2.7)
# caused "empty ring" errors in single-binary mode.

server:
  http_listen_port: 3200
  log_level: warn

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks
