# Grafana Tempo — single-binary config for local dev
# Receives OTLP from the OTel Collector and stores traces locally.

stream_over_http_enabled: true

server:
  http_listen_port: 3200
  log_level: warn  # reduce noise in dev; set info for debugging Tempo itself

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m  # flush blocks quickly for local dev

compactor:
  compaction:
    block_retention: 24h  # keep 24h of traces locally

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks
