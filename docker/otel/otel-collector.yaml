# OpenTelemetry Collector configuration for strus local dev
#
# Receives OTLP from the strus API and forwards to Jaeger.
# Phase 2: add Tempo/Loki/Prometheus exporters here without changing app code.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
  # Adds resource attributes useful for filtering in Jaeger
  resource:
    attributes:
      - key: deployment.environment
        value: development
        action: upsert

exporters:
  # Jaeger via OTLP (Jaeger v1.35+ supports native OTLP)
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # Debug exporter — logs span summaries to collector stdout
  # Remove or set verbosity: none in production
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [otlp/jaeger, debug]
