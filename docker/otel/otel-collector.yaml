# OpenTelemetry Collector — receives OTLP from strus-api/web, forwards to Tempo.
# To add more backends later (Loki, Prometheus), add exporters here and
# wire them into the pipelines — no app code changes needed.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

  resource:
    attributes:
      - key: deployment.environment
        value: development
        action: upsert

  # Drop spans that are noise: static assets, SPA fallback, media files.
  # These are always fast, never interesting, and drown out real traces.
  filter/drop_noise:
    error_mode: ignore
    traces:
      span:
        - 'IsMatch(name, "GET /assets/.*")'   # Vite-built JS/CSS chunks
        - 'IsMatch(name, "GET /media/.*")'    # Audio/image files
        # Note: don't filter "GET /*" (SPA fallback) here — dropping the root span
        # while its child "Handle" span passes through creates orphan spans in Tempo.

exporters:
  # Grafana Tempo — receives OTLP natively
  # Use otlp_grpc (otlp alias is deprecated in otelcol-contrib 0.147+)
  otlp_grpc/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  # Span summary to collector stdout (useful when debugging instrumentation)
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [filter/drop_noise, batch, resource]
      exporters: [otlp_grpc/tempo, debug]
