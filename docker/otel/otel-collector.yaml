# OpenTelemetry Collector — receives OTLP from strus-api/web, forwards to Tempo.
# To add more backends later (Loki, Prometheus), add exporters here and
# wire them into the pipelines — no app code changes needed.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

  resource:
    attributes:
      - key: deployment.environment
        value: development
        action: upsert

  # (No span filter needed — noisy routes are excluded via checkIfShouldTrace
  #  in packages/api/src/instrumentation.ts before spans are even created.)

exporters:
  # Grafana Tempo — receives OTLP natively
  # Use otlp_grpc (otlp alias is deprecated in otelcol-contrib 0.147+)
  otlp_grpc/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  # Span summary to collector stdout (useful when debugging instrumentation)
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [otlp_grpc/tempo, debug]
