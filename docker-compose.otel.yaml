# OTel observability stack — Grafana + Tempo + OTel Collector
#
# Run alongside the app:
#   docker compose -f docker-compose.otel.yaml up -d
#   OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318 bun run dev
#
# Or overlay on an existing compose file:
#   docker compose -f docker-compose.yaml -f docker-compose.otel.yaml up -d
#
# Grafana UI:    http://localhost:3000  (Explore → Tempo datasource)
# OTLP HTTP:     http://localhost:4318  (app → collector)
# OTLP gRPC:     localhost:4317         (app → collector)
#
# When adding Loki (logs) and Prometheus/Mimir (metrics) later:
#   1. Add services here
#   2. Add datasources to docker/otel/grafana-datasources.yaml
#   3. Add exporters to docker/otel/otel-collector.yaml
#   No app code changes needed.

networks:
  otel:
    driver: bridge

services:
  tempo:
    image: grafana/tempo:latest
    container_name: strus-tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./docker/otel/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    expose:
      - "3200"   # HTTP API (Grafana queries this)
      - "4317"   # OTLP gRPC (collector forwards here)
      - "4318"   # OTLP HTTP
    networks:
      - otel
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: strus-grafana
    volumes:
      - ./docker/otel/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    depends_on:
      - tempo
    networks:
      - otel
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: strus-otel-collector
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./docker/otel/otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC  (← app sends here)
      - "4318:4318"   # OTLP HTTP  (← app sends here)
    depends_on:
      - tempo
    networks:
      - otel
    restart: unless-stopped

volumes:
  tempo-data:
  grafana-data:
